networks:
  my_app-network:
    driver: bridge

volumes:
  my_app_postgres_data:

services:
  context-debug:
    build:
      context: ../
      dockerfile: docker/Dockerfile.debug
    volumes:
      - ./context-report:/out
    restart: "no" # Run once to generate reports, then exit
    profiles:
      - debug

  dev:
    build:
      context: ../
      dockerfile: docker/Dockerfile.dev
      target: dev
    image: my_app/dev:latest
    container_name: my_app-dev
    # Run as host user to avoid permission issues
    # For example (without this), if `dist` is created by the container,
    # the host user may not have permission to read/write it
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ..:/app  # Mount project root to /app
    command: pnpm dev
    environment:
      - NODE_ENV=development
    networks:
      - my_app-network
    profiles:
      - dev
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres
    container_name: my_app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-my_app_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    networks:
      - my_app-network
    ports:
      - "5432:5432"
    volumes:
      - my_app_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-my_app_db} -h ${POSTGRES_HOST:-localhost} -p ${POSTGRES_PORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev