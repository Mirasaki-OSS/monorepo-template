include:
  - ./compose.postgres.yaml

x-build-common: &build-common
  context: ../../
  # args:
  #   BUILDKIT_INLINE_CACHE: "1"
  # cache_from:
  #   - type=local,src=./.buildx-cache
  # cache_to:
  #   - type=local,dest=./.buildx-cache,mode=max

x-service-app-common: &service-app-common
  restart: unless-stopped
  environment:
    - NODE_ENV=production
  networks:
    - my_app-network

services:
  migrate:
    build:
      <<: *build-common
      dockerfile: deploy/docker/server.Dockerfile
      target: builder
    image: my_app/migrate:latest
    container_name: my_app-migrate
    command:
      - sh
      - -lc
      - |
        set -e
        pnpm --filter '@md-oss/db' db:ensure
        pnpm --filter '@md-oss/db' db:deploy
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-my_app_production}}
      - POSTGRES_ADMIN_DB=${POSTGRES_ADMIN_DB:-postgres}
    networks:
      - my_app-network
    restart: "no"
    profiles:
      - deploy
      - migrate
      - server

  cli:
    <<: *service-app-common
    build:
      <<: *build-common
      dockerfile: deploy/docker/cli.Dockerfile
    image: my_app/cli:latest
    container_name: my_app-cli
    env_file: ${RUNTIME_ENV_FILE:-../../.env.production}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
      - cli

  server:
    <<: *service-app-common
    build:
      <<: *build-common
      dockerfile: deploy/docker/server.Dockerfile
    image: my_app/server:latest
    container_name: my_app-server
    env_file: ${RUNTIME_ENV_FILE:-../../.env.production}
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-my_app_production}}
      - SERVER_PORT=4000
    ports:
      - "${DOCKER_SERVER_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - deploy
      - apps
      - server

  web:
    <<: *service-app-common
    build:
      <<: *build-common
      dockerfile: deploy/docker/web.Dockerfile
      args:
        - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_GA_MEASUREMENT_ID=${NEXT_PUBLIC_GA_MEASUREMENT_ID}
    image: my_app/web:latest
    container_name: my_app-web
    env_file: ${RUNTIME_ENV_FILE:-../../.env.production}
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "${DOCKER_WEB_PORT:-3000}:3000"
    depends_on:
      server:
        condition: service_started
    profiles:
      - deploy
      - apps
      - web
