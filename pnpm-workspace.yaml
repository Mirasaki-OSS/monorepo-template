packages:
  - apps/*
  - packages/*
  - vendor/*

injectWorkspacePackages: true # Required for pnpm deploy (Dockerfile)

catalog:
  '@tailwindcss/postcss': ^4.2.4
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  lucide-react: ^1.14.0
  next: ^16.2.4
  next-themes: ^0.4.6
  react: ^19.2.5
  react-dom: ^19.2.5
  tailwindcss: ^4.2.4
  react-syntax-highlighter: ^16.1.1
  '@types/react-syntax-highlighter': ^15.5.13

ignoredBuiltDependencies:
  - core-js-pure

onlyBuiltDependencies:
  - esbuild
  - lefthook
  - sharp
